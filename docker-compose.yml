services:
  api:
    build:
      context: ./numerus-kovesh-api/api
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8010
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173

  web:
    build:
      context: ./numerus-kovesh-web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://api:8010
    depends_on:
      - api